{% extends "base.html" %}
{% block title %}Connect – Azure Storage Client{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0"><i class="bi bi-plug-fill me-1"></i> Connect to Azure Storage</h5>
      </div>
      <div class="card-body">
        <form method="post" autocomplete="off">
          <div class="mb-3">
            <label for="account_name" class="form-label">Storage Account Name</label>
            <input
              type="text"
              id="account_name"
              name="account_name"
              class="form-control"
              placeholder="e.g. mystorageaccount"
              value="{{ account_name or '' }}"
              required
            />
          </div>
          <div class="mb-3">
            <label for="account_key" class="form-label">Account Key</label>
            <div class="input-group">
              <input
                type="password"
                id="account_key"
                name="account_key"
                class="form-control"
                placeholder="Paste your account key"
                value="{{ account_key or '' }}"
                required
              />
              <button
                class="btn btn-outline-secondary"
                type="button"
                id="toggleKey"
                title="Show / hide key"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Connect
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const toggleBtn = document.getElementById('toggleKey');
  const keyInput = document.getElementById('account_key');
  toggleBtn.addEventListener('click', () => {
    const isPassword = keyInput.type === 'password';
    keyInput.type = isPassword ? 'text' : 'password';
    toggleBtn.querySelector('i').className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
  });
</script>
{% endblock %}
