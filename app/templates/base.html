<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Azure Storage Client{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('storage.index') }}">
        <i class="bi bi-cloud-arrow-down-fill me-1"></i> Storage Client
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('storage.containers') }}">
              <i class="bi bi-archive"></i> Storage
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('files.browse') }}">
              <i class="bi bi-folder2-open"></i> Local Files
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('jobs.index') }}">
              <i class="bi bi-list-task"></i> Jobs
            </a>
          </li>
        </ul>

        <div class="d-flex align-items-center">
          {% if session.get('account_name') %}
            <span class="badge bg-success me-2">
              <i class="bi bi-plug-fill"></i> {{ session['account_name'] }}
            </span>
            <form action="{{ url_for('storage.disconnect') }}" method="post" class="m-0">
              <button class="btn btn-sm btn-outline-light" type="submit">
                <i class="bi bi-box-arrow-right"></i> Disconnect
              </button>
            </form>
          {% else %}
            <span class="badge bg-secondary">
              <i class="bi bi-plug"></i> Not connected
            </span>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container-fluid py-4">
    {% include 'partials/alerts.html' %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
